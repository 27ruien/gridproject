name: GridProject CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-visual:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gridproject_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gridproject_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/gridproject_ci?schema=public
      SESSION_SECRET: ci-session-secret-not-for-production
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.7 --activate

      - name: Install server dependencies
        run: pnpm --dir server install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prisma schema validate
        run: npm run db:validate

      - name: Generate server Prisma client
        run: npm run server:prisma:generate

      - name: Apply server migrations
        run: npm run server:prisma:migrate:deploy

      - name: Server lint
        run: npm run server:lint

      - name: Server build
        run: npm run server:build

      - name: Server tests
        run: npm run server:test

      - name: Build
        run: npm run build

      - name: Domain tests
        run: npm run test

      - name: Visual and interaction tests
        run: npm run test:visual

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
