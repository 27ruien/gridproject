name: GridProject CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-visual:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gridproject_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gridproject_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres?schema=public
      SESSION_SECRET: ci-session-secret-not-for-production
      FRONTEND_ORIGIN: http://127.0.0.1:5173
      NODE_ENV: test
      APP_VERSION: 0.1.0-dev.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: bash scripts/run-pnpm.sh --dir server install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Release check CI
        run: npm run release:check:ci

      - name: Visual and interaction tests
        run: npm run test:visual

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
